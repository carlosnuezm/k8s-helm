apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelines
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/carlosnuezm/k8s-helm.git
    targetRevision: main
    path: k8s/argocd/pipelines
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true