apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: service-api
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  generators:
  - list:
      elements:
      - namespace: dev
      - namespace: test
      - namespace: uat
  template:
    metadata:
      name: '{{namespace}}-service-api'
    spec:
      project: devops-tools
      source:
        repoURL: https://github.com/carlosnuezm/k8s-helm.git
        targetRevision: main
        path: k8s/api/newapi
        helm:
          valueFiles:
          - '{{namespace}}.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
